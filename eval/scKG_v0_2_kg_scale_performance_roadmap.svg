<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1260" viewBox="0 0 1680 1260">
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="64" y="72" font-size="38" font-weight="900" fill="#0f172a">scKG KG-Scale Performance Roadmap</text>
<text x="64" y="110" font-size="18" fill="#475569">A healthier story: as the reviewed formal KG grows, recommendation evidence support improves.</text>
<rect x="64" y="136" width="1552" height="76" rx="18" fill="#eff6ff" stroke="#2563eb"/>
<text x="92" y="168" font-size="20" font-weight="850" fill="#1e3a8a">Use KG evidence scale as the x-axis; do not frame publication support as whole-library completeness.</text>
<text x="92" y="194" font-size="14" fill="#1e40af">The key claim is benchmark-backed support growth from 50.0% to 77.8% as formal evidence grows from 32 to 42 records.</text>
<rect x="64" y="246" width="1120" height="580" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text x="92" y="284" font-size="24" font-weight="900" fill="#111827">KG Scale vs Recommendation Quality</text>
<text x="92" y="310" font-size="14" fill="#64748b">X-axis is formal KG evidence records, not version labels. Connected points use the same v0.2 blind protocol.</text>
<line x1="150" y1="740.0" x2="1120" y2="740.0" stroke="#e5e7eb"/>
<text x="136" y="745.0" text-anchor="end" font-size="12" fill="#64748b">0%</text>
<line x1="150" y1="637.0" x2="1120" y2="637.0" stroke="#e5e7eb"/>
<text x="136" y="642.0" text-anchor="end" font-size="12" fill="#64748b">25%</text>
<line x1="150" y1="534.0" x2="1120" y2="534.0" stroke="#e5e7eb"/>
<text x="136" y="539.0" text-anchor="end" font-size="12" fill="#64748b">50%</text>
<line x1="150" y1="431.0" x2="1120" y2="431.0" stroke="#e5e7eb"/>
<text x="136" y="436.0" text-anchor="end" font-size="12" fill="#64748b">75%</text>
<line x1="150" y1="328.0" x2="1120" y2="328.0" stroke="#e5e7eb"/>
<text x="136" y="333.0" text-anchor="end" font-size="12" fill="#64748b">100%</text>
<line x1="150" y1="328" x2="150" y2="740" stroke="#94a3b8"/>
<line x1="150" y1="740" x2="1120" y2="740" stroke="#94a3b8"/>
<line x1="224.6" y1="328" x2="224.6" y2="749" stroke="#f1f5f9"/>
<text x="224.6" y="774" text-anchor="middle" font-size="13" font-weight="850" fill="#111827">32 formal evidence</text>
<text x="224.6" y="794" text-anchor="middle" font-size="12" fill="#64748b">Formal base</text>
<text x="224.6" y="814" text-anchor="middle" font-size="12" fill="#64748b">23 papers / 9 benchmarks</text>
<line x1="821.5" y1="328" x2="821.5" y2="749" stroke="#f1f5f9"/>
<text x="821.5" y="774" text-anchor="middle" font-size="13" font-weight="850" fill="#111827">40 formal evidence</text>
<text x="821.5" y="794" text-anchor="middle" font-size="12" fill="#64748b">+ Cell2location</text>
<text x="821.5" y="814" text-anchor="middle" font-size="12" fill="#64748b">28 papers / 12 benchmarks</text>
<line x1="970.8" y1="328" x2="970.8" y2="749" stroke="#f1f5f9"/>
<text x="970.8" y="774" text-anchor="middle" font-size="13" font-weight="850" fill="#111827">42 formal evidence</text>
<text x="970.8" y="794" text-anchor="middle" font-size="12" fill="#64748b">+ MOFA2/scVelo</text>
<text x="970.8" y="814" text-anchor="middle" font-size="12" fill="#64748b">28 papers / 14 benchmarks</text>
<line x1="224.6" y1="362.3" x2="821.5" y2="328.0" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
<line x1="821.5" y1="328.0" x2="970.8" y2="328.0" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
<circle cx="224.6" cy="362.3" r="8" fill="#059669" stroke="#ffffff" stroke-width="3"/>
<text x="224.6" y="349.3" text-anchor="middle" font-size="13" font-weight="850" fill="#059669">91.7%</text>
<circle cx="821.5" cy="328.0" r="8" fill="#059669" stroke="#ffffff" stroke-width="3"/>
<text x="821.5" y="315.0" text-anchor="middle" font-size="13" font-weight="850" fill="#059669">100.0%</text>
<circle cx="970.8" cy="328.0" r="8" fill="#059669" stroke="#ffffff" stroke-width="3"/>
<text x="970.8" y="315.0" text-anchor="middle" font-size="13" font-weight="850" fill="#059669">100.0%</text>
<text x="982.8" y="333.0" font-size="13" font-weight="850" fill="#059669">C top-k hit</text>
<line x1="224.6" y1="465.3" x2="821.5" y2="413.8" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
<line x1="821.5" y1="413.8" x2="970.8" y2="373.8" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
<circle cx="224.6" cy="465.3" r="8" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>
<text x="224.6" y="452.3" text-anchor="middle" font-size="13" font-weight="850" fill="#2563eb">66.7%</text>
<circle cx="821.5" cy="413.8" r="8" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>
<text x="821.5" y="400.8" text-anchor="middle" font-size="13" font-weight="850" fill="#2563eb">79.2%</text>
<circle cx="970.8" cy="373.8" r="8" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>
<text x="970.8" y="360.8" text-anchor="middle" font-size="13" font-weight="850" fill="#2563eb">88.9%</text>
<text x="982.8" y="378.8" font-size="13" font-weight="850" fill="#2563eb">C main-tool evidence support</text>
<line x1="224.6" y1="396.7" x2="821.5" y2="328.0" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>
<line x1="821.5" y1="328.0" x2="970.8" y2="328.0" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>
<circle cx="224.6" cy="396.7" r="8" fill="#7c3aed" stroke="#ffffff" stroke-width="3"/>
<text x="224.6" y="383.7" text-anchor="middle" font-size="13" font-weight="850" fill="#7c3aed">83.3%</text>
<circle cx="821.5" cy="328.0" r="8" fill="#7c3aed" stroke="#ffffff" stroke-width="3"/>
<text x="821.5" y="315.0" text-anchor="middle" font-size="13" font-weight="850" fill="#7c3aed">100.0%</text>
<circle cx="970.8" cy="328.0" r="8" fill="#7c3aed" stroke="#ffffff" stroke-width="3"/>
<text x="970.8" y="315.0" text-anchor="middle" font-size="13" font-weight="850" fill="#7c3aed">100.0%</text>
<text x="982.8" y="333.0" font-size="13" font-weight="850" fill="#7c3aed">C main-tool publication support</text>
<line x1="224.6" y1="534.0" x2="821.5" y2="499.7" stroke="#d97706" stroke-width="5" stroke-linecap="round"/>
<line x1="821.5" y1="499.7" x2="970.8" y2="419.6" stroke="#d97706" stroke-width="5" stroke-linecap="round"/>
<circle cx="224.6" cy="534.0" r="8" fill="#d97706" stroke="#ffffff" stroke-width="3"/>
<text x="224.6" y="521.0" text-anchor="middle" font-size="13" font-weight="850" fill="#d97706">50.0%</text>
<circle cx="821.5" cy="499.7" r="8" fill="#d97706" stroke="#ffffff" stroke-width="3"/>
<text x="821.5" y="486.7" text-anchor="middle" font-size="13" font-weight="850" fill="#d97706">58.3%</text>
<circle cx="970.8" cy="419.6" r="8" fill="#d97706" stroke="#ffffff" stroke-width="3"/>
<text x="970.8" y="406.6" text-anchor="middle" font-size="13" font-weight="850" fill="#d97706">77.8%</text>
<text x="982.8" y="424.6" font-size="13" font-weight="850" fill="#d97706">C main-tool benchmark support</text>
<text x="92" y="802" font-size="13" fill="#64748b">Publication/benchmark support rates are local to the v0.2 blind top-k main tools. They are not whole-KG completeness rates.</text>
<rect x="1212" y="246" width="404" height="580" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text x="1236" y="284" font-size="22" font-weight="900" fill="#111827">What Actually Improved</text>
<text x="1236" y="310" font-size="14" fill="#64748b">Data scale first; policy fix second.</text>
<rect x="1236" y="334" width="356" height="112" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
<text x="1254" y="362" font-size="13" font-weight="850" fill="#64748b">Formal evidence records</text>
<text x="1254" y="404" font-size="30" font-weight="900" fill="#2563eb">32 -&gt; 42</text>
<text x="1254" y="430" font-size="12" fill="#64748b">23 -&gt; 28 papers; 9 -&gt; 14 benchmarks</text>
<rect x="1236" y="462" width="356" height="112" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
<text x="1254" y="490" font-size="13" font-weight="850" fill="#64748b">Top-k main-tool evidence</text>
<text x="1254" y="532" font-size="30" font-weight="900" fill="#2563eb">66.7% -&gt; 88.9%</text>
<text x="1254" y="558" font-size="12" fill="#64748b">Main tool has publication and/or benchmark support.</text>
<rect x="1236" y="590" width="356" height="112" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
<text x="1254" y="618" font-size="13" font-weight="850" fill="#64748b">Benchmark-backed support</text>
<text x="1254" y="660" font-size="30" font-weight="900" fill="#d97706">50.0% -&gt; 77.8%</text>
<text x="1254" y="686" font-size="12" fill="#64748b">This is the stronger claim for benchmark ingestion.</text>
<rect x="1236" y="718" width="356" height="112" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
<text x="1254" y="746" font-size="13" font-weight="850" fill="#64748b">MCDM v2</text>
<text x="1254" y="788" font-size="30" font-weight="900" fill="#7c3aed">42 records</text>
<text x="1254" y="814" font-size="12" fill="#64748b">Same KG size; qualitative/caveat evidence is stricter.</text>
<rect x="64" y="866" width="1552" height="270" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
<text x="92" y="906" font-size="22" font-weight="900" fill="#111827">Interpretation Guardrails</text>
<text x="92" y="942" font-size="15" fill="#111827">1. 100% publication support means every evaluated top-k main tool had canonical publication evidence in this blind set; it does not mean the whole KG has complete publications.</text>
<text x="92" y="974" font-size="15" fill="#111827">2. Benchmark support is lower because reviewed benchmark evidence is task-specific and harder to curate than canonical papers.</text>
<text x="92" y="1006" font-size="15" fill="#111827">3. The scale trend should use the first three connected points. MCDM v2 is a governance/scoring policy reference at the same 42-record KG scale.</text>
<text x="92" y="1038" font-size="15" fill="#111827">4. Under MCDM v2, C-route benchmark support is 69.4% because the audited output is stricter; this should not be sold as a data-scale gain.</text>
<text x="92" y="1080" font-size="13" fill="#64748b">v0.1 prototype is intentionally excluded from the trend line because it used an earlier protocol; mixing it with v0.2 blind KG-scale snapshots creates the misleading jump you flagged.</text>
<text x="64" y="1172" font-size="12" fill="#64748b">Formal base: 32 formal evidence, 23 papers, 9 benchmarks, C top-k 91.7%, C benchmark support 50.0%</text>
<text x="64" y="1190" font-size="12" fill="#64748b">+ Cell2location: 40 formal evidence, 28 papers, 12 benchmarks, C top-k 100.0%, C benchmark support 58.3%</text>
<text x="64" y="1208" font-size="12" fill="#64748b">+ MOFA2/scVelo: 42 formal evidence, 28 papers, 14 benchmarks, C top-k 100.0%, C benchmark support 77.8%</text>
<text x="64" y="1226" font-size="12" fill="#64748b">MCDM fix v2: 42 formal evidence, 28 papers, 14 benchmarks, C top-k 100.0%, C benchmark support 69.4%</text>
</svg>